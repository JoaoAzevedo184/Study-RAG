server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: study-rag
  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/studyrag}
    username: ${SPRING_DATASOURCE_USERNAME:studyrag}
    password: ${SPRING_DATASOURCE_PASSWORD:studyrag}

  flyway:
    enabled: true
    locations: classpath:db/migration

  ai:
    ollama:
      base-url: ${SPRING_AI_OLLAMA_BASE_URL:http://localhost:11434}
      embedding:
        options:
          model: nomic-embed-text
      chat:
        options:
          model: llama3.2:3b-instruct-q4_K_M
          # Maximiza throughput de inferência em CPU no homelab
          num-thread: 8
    vectorstore:
      pgvector:
        # O PgVectorStore é dono do esquema da tabela de vetores (fora do Flyway).
        initialize-schema: true
        table-name: vector_store
        dimensions: 768
        distance-type: COSINE_DISTANCE
        index-type: HNSW

# Configuração própria da ingestão
studyrag:
  ingestion:
    # Diretório local que contém os uploads referenciados por sourceUri.
    uploads-dir: ${STUDYRAG_UPLOADS_DIR:./uploads}
    # Prefixo lógico do sourceUri que mapeia para uploads-dir (ex.: /uploads/x.pdf).
    uri-prefix: ${STUDYRAG_UPLOADS_URI_PREFIX:/uploads}
    chunk:
      size: 1000
      overlap: 200
  # Recuperação por similaridade (UC-5 / RN-8). MVP: sem hybrid search nem reranking.
  retrieval:
    # Chunks recuperados quando o pedido não informa topK (contrato: 5).
    default-top-k: 5
    # Score mínimo (cosseno normalizado) para um chunk ser relevante; abaixo ⇒ "não sei".
    similarity-threshold: 0.5
  # Geração da resposta fundamentada (RN-6/RN-7). O provedor (Ollama padrão, Groq
  # alternável) é definido em spring.ai acima; esta camada é agnóstica ao provedor.
  generation:
    no-answer-message: "Não encontrei essa informação nos documentos disponíveis."

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
