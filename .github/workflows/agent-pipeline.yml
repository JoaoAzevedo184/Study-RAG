name: Agent CI/CD Pipeline

on:
  push:
    branches: [main]

jobs:

  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install OpenAPI Generator
        run: npm install @openapitools/openapi-generator-cli -g

      - name: Validate OpenAPI
        run: openapi-generator-cli validate -i study-rag-openapi.yml

      - name: Generate Backend Types
        run: |
          openapi-generator-cli generate \
          -i study-rag-openapi.yml \
          -g java \
          --global-property models \
          -o generated/backend

      - name: Generate Frontend Types
        run: |
          openapi-generator-cli generate \
          -i study-rag-openapi.yml \
          -g typescript-fetch \
          --global-property models,apis \
          -o generated/frontend

  agent-back-ingestion:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Run Claude Code Agent
        run: |
          echo "Aqui você chamaria o Claude Code via CLI/API"
          # exemplo fictício:
          # claude-code run prompt-back-ingestion.md

  agent-back-rag:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Run OpenRouter Agent
        run: |
          echo "Chamar OpenRouter com prompt RAG"

  agent-front-chat:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Run Chat Agent
        run: |
          echo "Rodar agente de chat UI"

  agent-front-sources:
    runs-on: ubuntu-latest
    needs: setup
    steps:
      - uses: actions/checkout@v4

      - name: Run Codex Agent
        run: |
          echo "Rodar Codex"

  integration:
    runs-on: ubuntu-latest
    needs:
      - agent-back-ingestion
      - agent-back-rag
      - agent-front-chat
      - agent-front-sources

    steps:
      - uses: actions/checkout@v4

      - name: Build Backend
        run: ./mvnw clean package

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      - name: Run Docker Compose
        run: docker compose up -d

      - name: Run E2E Test
        run: |
          echo "Testar ingest + query"