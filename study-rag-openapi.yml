openapi: 3.0.3
info:
  title: study-rag API
  version: 1.0.0-mvp
  description: >
    Contrato da API do study-rag — Nível 1 (MVP). Fonte de verdade única para
    backend (Spring Boot + Spring AI), frontend (React) e testes. Sistema RAG
    single-user que indexa documentos pessoais e responde perguntas com fontes
    citadas. Escopo do MVP: ingestão de PDF e Markdown, chunking recursivo,
    embeddings via Ollama, persistência em pgvector, retrieval por similaridade,
    geração com citação de fontes, deduplicação por hash e coleções.
  contact:
    name: João Victor Azevedo
servers:
  - url: http://localhost/api/v1
    description: Homelab (via Nginx reverse proxy)
  - url: http://localhost:8080/api/v1
    description: Backend direto (desenvolvimento)

tags:
  - name: Ingestion
    description: Indexação de documentos no acervo
  - name: Sources
    description: Consulta e remoção de fontes ingeridas
  - name: Collections
    description: Agrupamentos temáticos de fontes
  - name: Query
    description: Perguntas ao acervo com resposta e fontes citadas

paths:
  /ingest:
    post:
      tags: [Ingestion]
      summary: Ingere um documento (PDF ou Markdown)
      description: >
        Indexa um arquivo já presente no diretório de uploads. Operação
        idempotente: se o conteúdo (hash SHA-256) já foi ingerido, retorna
        status SKIPPED_UNCHANGED sem reprocessar.
      operationId: ingestDocument
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IngestRequest'
      responses:
        '202':
          description: Documento aceito para ingestão (ou pulado se inalterado)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IngestResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          description: Arquivo não encontrado no diretório de uploads
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '415':
          description: Tipo de arquivo não suportado no MVP
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sources:
    get:
      tags: [Sources]
      summary: Lista fontes ingeridas
      operationId: listSources
      parameters:
        - name: collection
          in: query
          required: false
          schema:
            type: string
          description: Filtra fontes por coleção
      responses:
        '200':
          description: Lista de fontes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Source'

  /sources/{fileId}:
    delete:
      tags: [Sources]
      summary: Remove uma fonte e seus vetores
      description: Remove o registro da fonte e todos os chunks associados no vector store.
      operationId: deleteSource
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Removido com sucesso
        '404':
          description: Fonte não encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /collections:
    get:
      tags: [Collections]
      summary: Lista coleções com contagens
      operationId: listCollections
      responses:
        '200':
          description: Lista de coleções
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Collection'

  /query:
    post:
      tags: [Query]
      summary: Pergunta ao acervo
      description: >
        Recupera os chunks mais similares à pergunta (opcionalmente restritos a
        uma coleção) e gera uma resposta fundamentada exclusivamente neles,
        retornando as fontes citadas.
      operationId: query
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QueryRequest'
      responses:
        '200':
          description: Resposta gerada com fontes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QueryResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          description: Coleção informada não existe ou está vazia
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    IngestRequest:
      type: object
      required: [sourceType, sourceUri]
      properties:
        sourceType:
          type: string
          enum: [pdf, markdown]
          description: Tipo de fonte (MVP suporta apenas pdf e markdown)
        sourceUri:
          type: string
          description: Caminho do arquivo sob o diretório de uploads
          example: /uploads/spring-ai-guide.pdf
        collection:
          type: string
          default: default
          maxLength: 80
          pattern: '^[a-z0-9-]+$'
          description: Coleção destino (slug minúsculo, hífens permitidos)
          example: bootcamp-ntt
        metadata:
          type: object
          additionalProperties:
            type: string
          description: Metadados livres associados à fonte

    IngestResponse:
      type: object
      required: [fileId, status]
      properties:
        fileId:
          type: string
          format: uuid
        status:
          type: string
          enum: [INGESTED, SKIPPED_UNCHANGED]
        chunkCount:
          type: integer
          description: Número de chunks gerados (0 quando SKIPPED_UNCHANGED)
          example: 42

    Source:
      type: object
      required: [fileId, sourceType, sourceUri, collection, status]
      properties:
        fileId:
          type: string
          format: uuid
        sourceType:
          type: string
          enum: [pdf, markdown]
        sourceUri:
          type: string
        collection:
          type: string
        title:
          type: string
          nullable: true
        chunkCount:
          type: integer
        status:
          type: string
          enum: [INGESTED, PROCESSING, FAILED]
        ingestedAt:
          type: string
          format: date-time

    Collection:
      type: object
      required: [name, fileCount, chunkCount]
      properties:
        name:
          type: string
        fileCount:
          type: integer
        chunkCount:
          type: integer

    QueryRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
          minLength: 3
          maxLength: 2000
          example: Qual a diferença entre chunking recursivo e semântico?
        collection:
          type: string
          nullable: true
          description: Restringe a busca a uma coleção; nulo busca em todas
        topK:
          type: integer
          minimum: 1
          maximum: 20
          default: 5
          description: Número de chunks a recuperar

    QueryResponse:
      type: object
      required: [answer, sources, metrics]
      properties:
        answer:
          type: string
          description: >
            Resposta fundamentada no contexto. Se nenhum chunk relevante for
            encontrado, contém a mensagem de "não sei" e sources vazio.
        sources:
          type: array
          items:
            $ref: '#/components/schemas/SourceCitation'
        metrics:
          $ref: '#/components/schemas/QueryMetrics'

    SourceCitation:
      type: object
      required: [sourceUri, snippet, score]
      properties:
        sourceUri:
          type: string
        title:
          type: string
          nullable: true
        collection:
          type: string
        page:
          type: integer
          nullable: true
        snippet:
          type: string
          description: Trecho do chunk que embasou a resposta
        score:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Score de similaridade (cosseno normalizado)

    QueryMetrics:
      type: object
      properties:
        retrievalMs:
          type: integer
        generationMs:
          type: integer
        tokensUsed:
          type: integer
        chunksRetrieved:
          type: integer

    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          example: SOURCE_NOT_FOUND
        message:
          type: string
        details:
          type: object
          additionalProperties: true

  responses:
    BadRequest:
      description: Requisição inválida (validação de campos falhou)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'